# VQE H2 + Flyte 编排示例的本地驱动机 conda 环境。
#
# 这个环境用来:
#   1. 跑 `python workflow.py` 做本地 sanity check（不走 K8s，进程内顺序跑）。
#   2. 跑 `pyflyte run --remote` / `pyflyte register` 把 workflow 提交到 Flyte
#      集群（pyflyte 这个 CLI 自身需要 flytekit + qiskit-* 已就绪，因为它要
#      在本地对 workflow.py 做静态分析与 type stub 编译）。
#
# 用法（从仓库根目录）:
#   conda env create -f examples/vqe_h2_flyte_pipeline_demo/environment.yml
#   conda activate qml-vqe-h2-flyte
#   pip install -e .
#
# 容器内运行时的依赖由 workflow.py 中的 ImageSpec.packages 控制，与下面 pip
# 列表一一对齐。两份相同清单 = 本地与容器跑出来一定一致。
name: qml-vqe-h2-flyte
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - pip:
      # --- Flyte 编排 ---
      - "flytekit>=1.13,<2"
      # --- 与 vqe_h2_pipeline_demo 完全一致的量子化学 + VQE 栈 ---
      - "qiskit>=2,<3"
      - "qiskit-algorithms==0.4.0"
      - "qiskit-nature[pyscf]==0.7.2"
      - "qiskit-aer>=0.17"
      - "numpy>=2.0"
      - "scipy>=1.10"
      - "matplotlib>=3.7"
      - "dill>=0.3.4"
      - "pylatexenc>=2.10"
